# DET-005: Credential Vault Extraction via Non-System Process
# Format: Next-Gen SIEM Query
# Technique: T1555 - Credentials from Password Stores
# Severity: HIGH
# Case Evidence: SIR-REDACT-09 (unsigned executable accessing DPAPI credential store)

# DESCRIPTION:
# Detects non-system processes accessing Windows Credential Manager vault files
# or DPAPI master key stores. Legitimate access to these paths is performed by
# lsass.exe, svchost.exe, and credential management UI (credwiz.exe).
# Any other process — especially unsigned or user-writable-path executables —
# accessing these paths warrants immediate investigation.
#
# Infostealer malware commonly reads these files directly to extract stored
# credentials for browsers, RDP, and Windows integrated authentication.

# DETECTION LOGIC:
FROM file WHERE
  (
    file_path ILIKE '%\AppData\Roaming\Microsoft\Credentials\%'
    OR file_path ILIKE '%\AppData\Local\Microsoft\Credentials\%'
    OR file_path ILIKE '%\AppData\Roaming\Microsoft\Protect\%'
    OR file_path ILIKE '%\AppData\Local\Microsoft\Protect\%'
    OR file_path ILIKE '%\Windows\System32\config\systemprofile\AppData\Local\Microsoft\Credentials\%'
  )
  AND event_type IN ('read', 'open', 'copy')
  AND NOT (
    process_name IN ('lsass.exe', 'svchost.exe', 'credwiz.exe', 'dpapimig.exe',
                     'explorer.exe', 'taskhostw.exe', 'userinit.exe')
    OR process_path ILIKE '%\Windows\System32\%'
    OR process_path ILIKE '%\Windows\SysWOW64\%'
  )
SEVERITY HIGH

# FALSE POSITIVE NOTES:
# - Enterprise password managers (1Password, Bitwarden) may access vault paths
#   → Add by signed process path, NOT by name (attackers can rename binaries)
# - Backup agents reading full profile directories
#   → Add by vendor certificate hash, not filename
# - IT audit/inventory tools scanning file metadata
#   → Suppress by process signing status + known corporate cert

# TUNING: BEFORE vs AFTER
# BEFORE: N/A — new detection, gap identified from infostealer case analysis
# AFTER:  Expected 0 alerts/month in normal operations.
#         Any alert requires investigation — legitimate tools should be
#         added to allowlist only after verification of signing status.
#
# RECOMMENDED RESPONSE:
# 1. Capture process tree: what spawned the accessing process?
# 2. Check code signing status of accessing process
# 3. Review process reputation (hash lookup via VirusTotal/internal threat intel)
# 4. If unsigned or unknown: collect memory dump, quarantine process, isolate host
# 5. Assume credentials are compromised: initiate credential rotation for affected user
